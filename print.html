<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','Noto Sans Thai','Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#0f4c75);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:20px;font-weight:800}
header p{font-size:13px;opacity:.75;margin-top:2px}
.toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-refresh{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-refresh:hover{background:#e2e8f0}
.btn-all{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
.btn-all:hover{opacity:.9}
.btn-all:disabled{background:#94a3b8;cursor:not-allowed}
.count{font-size:13px;color:#64748b;margin-left:auto}
.content{padding:24px;max-width:1100px;margin:0 auto}
.loading{text-align:center;padding:60px;color:#64748b;font-size:15px}
.empty{text-align:center;padding:60px;color:#94a3b8}
table{width:100%;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-collapse:collapse;overflow:hidden}
thead{background:#1e3a5f;color:#fff}
th{padding:12px 14px;text-align:left;font-size:12px;font-weight:700;letter-spacing:.05em}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;color:#374151}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.badge-num{background:#e0e7ff;color:#3730a3;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
.btn-print{background:#059669;color:#fff;padding:6px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-print:hover{background:#047857}
.btn-print:disabled{background:#94a3b8;cursor:not-allowed}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>

  clinic_address: "279 ถนนมาเจริญ แขวงหนองแขม เขตหนองแขม กรุงเทพมหานคร 10160",
  clinic_phone: "089-7788151",
  exam_day: "25", exam_month: "พฤษภาคม", exam_year: "2569",
  doctor_sign_name: "นายแพทย์พงษ์พิชิต กนิษฐานนท์",
};

let allData = [];

// ===== โหลดข้อมูลจาก Sheet =====
async function loadData() {
  if (!API_URL) { showToast("❌ ยังไม่ได้ตั้งค่า API_URL"); return; }
  document.getElementById("loading").style.display = "block";
  document.getElementById("table").style.display = "none";
  document.getElementById("empty").style.display = "none";

  try {
    const res  = await fetch(API_URL + "?action=getAll");
    const json = await res.json();
    allData = json.data || [];
    renderTable(allData);
  } catch(e) {
    showToast("❌ โหลดไม่สำเร็จ: " + e.message);
    document.getElementById("loading").style.display = "none";
  }
}

function renderTable(rows) {
  document.getElementById("loading").style.display = "none";
  if (!rows.length) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("count-label").textContent = "ยังไม่มีข้อมูล";
    document.getElementById("btn-all").disabled = true;
    return;
  }
  document.getElementById("table").style.display = "table";
  document.getElementById("count-label").textContent = `นักเรียนทั้งหมด ${rows.length} คน`;
  document.getElementById("btn-all").disabled = false;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  rows.forEach((r, i) => {
    const addr = [r["บ้านเลขที่"], r["ซอย"], r["ถนน"], r["ตำบล/แขวง"], r["อำเภอ/เขต"], r["จังหวัด"], r["รหัสไปรษณีย์"]]
      .filter(Boolean).join(" ");
    tbody.innerHTML += `
      <tr>
        <td><span class="badge-num">${r["ลำดับ"]||i+1}</span></td>
        <td style="color:#64748b;font-size:12px">${r["เวลา"]||""}</td>
        <td style="font-weight:700">${r["ชื่อ-นามสกุล"]||""}</td>
        <td style="text-align:center">${r["อายุ"]||""}</td>
        <td style="font-size:12px;color:#475569">${r["เลขบัตรประชาชน"]||""}</td>
        <td style="font-size:12px;color:#475569;max-width:200px">${addr||"-"}</td>
        <td style="font-size:12px">${r["โทรศัพท์"]||"-"}</td>
        <td><button class="btn-print" onclick="printOne(${i})">🖨️ ปริ้น</button></td>
      </tr>`;
  });
}

// ===== สร้างและปริ้น PDF =====
function splitAddr(tokens, maxChars) {
  const lines = ["",""];
  let li = 0;
  for (const t of tokens) {
    if (li >= 2) break;
    const c = lines[li] ? lines[li]+" "+t : t;
    if (c.length <= maxChars[li]) lines[li] = c;
    else { li++; if(li<2) lines[li]=t; }
  }
  return lines;
}

async function buildPdf(row) {
  const { PDFDocument, rgb } = PDFLib;
  const pdfBytes  = Uint8Array.from(atob(PDF_B64),  c=>c.charCodeAt(0));
  const fontBytes = Uint8Array.from(atob(FONT_B64), c=>c.charCodeAt(0));
  const pdfDoc = await PDFDocument.load(pdfBytes);
  pdfDoc.registerFontkit(window.fontkit);
  const font = await pdfDoc.embedFont(fontBytes);
  const page = pdfDoc.getPages()[0];
  const fs = 9;

  function t(x, y_top, text) {
    if (!text) return;
    page.drawText(String(text), { x, y: 842-y_top-fs, size:fs, font, color:rgb(0,0,0) });
  }

  // ที่อยู่คลินิก (word-wrap)
  const cTokens = CLINIC.clinic_address.split(" ");
  const [cL1, cL2] = splitAddr(cTokens, [28, 60]);

  // ที่อยู่ผู้ป่วย (word-wrap)
  const addrTokens = [
    row["บ้านเลขที่"], row["หมู่บ้าน"],
    row["ซอย"] ? (row["ซอย"].startsWith("ซ.")?row["ซอย"]:"ซ."+row["ซอย"]) : "",
    row["ถนน"] ? (row["ถนน"].startsWith("ถ.")?row["ถนน"]:"ถ."+row["ถนน"]) : "",
    row["ตำบล/แขวง"], row["อำเภอ/เขต"], row["จังหวัด"], row["รหัสไปรษณีย์"]
  ].filter(Boolean);
  const [pL1, pL2] = splitAddr(addrTokens, [18, 48]);

  const name = row["ชื่อ-นามสกุล"] || "";

  // กรอกข้อมูล
  t(393,119, CLINIC.place);
  t(322,143, CLINIC.day);   t(378,143, CLINIC.month);  t(491,143, CLINIC.year);
  t(296,167, CLINIC.doctor_name);
  t(263,188, CLINIC.license_no);
  t(380,209, cL1);
  t(71, 230, cL2);          t(458,230, CLINIC.clinic_phone);
  t(205,251, name);         t(487,251, row["อายุ"]||"");
  t(191,272, row["เลขบัตรประชาชน"]||"");
  t(418,272, pL1);
  t(71, 293, pL2);          t(462,293, row["โทรศัพท์"]||"");
  t(177,314, CLINIC.exam_day); t(222,314, CLINIC.exam_month); t(304,314, CLINIC.exam_year);
  t(210,345, name);
  t(330,682, CLINIC.doctor_sign_name);

  return await pdfDoc.save();
}

async function printOne(idx) {
  const btn = document.querySelectorAll(".btn-print")[idx];
  btn.disabled = true; btn.textContent = "⏳";
  try {
    const bytes = await buildPdf(allData[idx]);
    const url = URL.createObjectURL(new Blob([bytes], {type:"application/pdf"}));
    window.open(url, "_blank");
    showToast("✅ เปิด PDF แล้ว — กด Ctrl+P เพื่อปริ้น");
  } catch(e) { showToast("❌ "+e.message); }
  btn.disabled = false; btn.textContent = "🖨️ ปริ้น";
}

async function printAll() {
  const btn = document.getElementById("btn-all");
  btn.disabled = true; btn.textContent = "⏳ กำลังสร้าง...";
  try {
    // รวมทุก PDF เป็นไฟล์เดียว
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    for (const row of allData) {
      const bytes = await buildPdf(row);
      const src   = await PDFDocument.load(bytes);
      const [pg]  = await merged.copyPages(src, [0]);
      merged.addPage(pg);
    }
    const mergedBytes = await merged.save();
    const url = URL.createObjectURL(new Blob([mergedBytes], {type:"application/pdf"}));
    window.open(url, "_blank");
    showToast(`✅ เปิด PDF รวม ${allData.length} ใบ — กด Ctrl+P ปริ้นทีเดียว`);
  } catch(e) { showToast("❌ "+e.message); }
  btn.disabled = false; btn.textContent = "🖨️ ปริ้นทุกใบ";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3500);
}

// โหลดอัตโนมัติ
loadData();
</script>
